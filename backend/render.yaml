services:
  - type: web
    name: xeno-transaction-validator-api
    runtime: python311
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "true"
